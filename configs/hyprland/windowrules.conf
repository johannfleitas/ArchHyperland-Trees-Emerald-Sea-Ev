windowrule {
    name = volume-control
    match:class = ^(org.pulseaudio.pavucontrol)$
    
    float = on
    size = 436 277
    move = 837 42
}

windowrule {
    name = org.kde.dolphin-float
    match:class = ^(org.kde.dolphin)$
    
    float = on
    size = 650 450
}

windowrule {
    name = dolphin
    match:title = ^(Abrir archivos)
    match:class = ^(helium)$
    
    float = on
    size = 500 450
}

windowrule {
    name = suppress-maximize-requests
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-dragging
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
    
    no_focus = on
}

windowrule {
    name = steam
    match:class = ^(steam)$
}

windowrule {
    name = steam-friends
    match:class = ^(steam)$
    match:title = ^(Friends List)
    float = on
    size = 225 450
    move = 1050 185
}

