general {
    grace = 0
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = screenshot   # o la ruta a tu wallpaper
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.35
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <span foreground="##cdd6f4">Password...</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# Label de hora (opcional)
label {
    monitor =
    text = cmd[update: 1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(242, 243, 244, 0.75)
    font_size = 95
    font_family = JetBrains Mono
    position = 0, 300
    halign = center
    valign = center
}

# Label de fecha (opcional)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%A, %d %B")</span>"
    color = rgba(242, 243, 244, 0.75)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 200
    halign = center
    valign = center
}
